openapi: 3.0.0
info:
  title: SDL E-commerce & RAG AI API
  description: Tài liệu đặc tả API cho hệ thống bán sách tích hợp AI
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
    description: Node.js E-commerce Server
  - url: http://localhost:8000/api
    description: FastAPI RAG Server
paths:
  /auth/login:
    post:
      summary: Đăng nhập người dùng
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Đăng nhập thành công
          content:
            application/json:
              schema:
                type: object